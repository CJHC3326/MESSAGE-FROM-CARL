<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>i miss u</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center relative text-gray-800 selection:bg-pink-200">

    <!-- Background Canvas for Particles -->
    <canvas id="bgCanvas" class="absolute top-0 left-0 w-full h-full z-0"></canvas>

    <!-- Main Content -->
    <div class="z-10 flex flex-col items-center justify-center w-full max-w-2xl px-4">
        
        <!-- Header / Love Counter -->
        <div class="text-center mb-8 animate-fade-in-down">
            <h1 class="text-4xl md:text-5xl font-handwriting text-pink-600 drop-shadow-sm mb-2">My Everything, Samantha.</h1>
            <div class="bg-white/60 backdrop-blur-sm px-6 py-2 rounded-full shadow-sm border border-pink-100 inline-block">
                <p class="text-pink-500 font-semibold tracking-wide text-sm md:text-base">
                    Days I've loved you: <span id="dayCounter" class="text-2xl font-bold text-pink-600 ml-1">0</span>
                </p>
            </div>
        </div>

        <!-- Envelope Interaction Area -->
        <div class="relative h-[400px] w-full flex justify-center items-center">
            
            <!-- The Envelope -->
            <div id="envelopeContainer" class="envelope-container">
                <div id="envelope" class="envelope">
                    <!-- Back/Body -->
                    <div class="envelope-body"></div>
                    <!-- Letter Inside -->
                    <div class="letter text-center overflow-hidden">
                        <div class="w-full h-full overflow-y-auto pr-2 custom-scrollbar">
                            <h3 class="font-handwriting text-2xl text-pink-500 mb-2">To My FUTURE Girlfriend,</h3>
                            <p id="letterText" class="text-gray-600 text-sm md:text-base leading-relaxed font-handwriting text-lg"></p>
                            <span id="cursor" class="cursor h-4 md:h-5">&nbsp;</span>
                            <p class="mt-4 font-handwriting text-xl text-pink-600">Forever Yours.</p>
                        </div>
                    </div>
                    <!-- Pocket -->
                    <div class="envelope-pocket"></div>
                    <!-- Flap -->
                    <div class="envelope-flap"></div>
                    <!-- Seal -->
                    <div class="seal">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                        </svg>
                    </div>
                </div>
            </div>

            <!-- Click Instruction -->
            <div id="instruction" class="absolute -bottom-4 text-pink-400 font-handwriting text-xl animate-pulse">
                Click to open my heart
            </div>
        </div>

        <!-- Interactive Buttons (Hidden initially) -->
        <div id="controls" class="mt-12 flex gap-4 opacity-0 transition-opacity duration-1000 pointer-events-none">
            <button onclick="triggerHeartRain()" class="glow-btn bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 px-8 rounded-full shadow-lg transform transition flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd" />
                </svg>
                Shower Love
            </button>
            <button onclick="showLoveMessage()" class="bg-white hover:bg-pink-50 text-pink-500 border-2 border-pink-200 font-bold py-3 px-8 rounded-full shadow-md transform transition hover:scale-105">
                CLICK HERE SAM
            </button>
        </div>

    </div>

    <!-- Audio Toggle -->
    <button id="audioToggle" class="absolute top-4 right-4 z-50 bg-white/80 p-2 rounded-full shadow-md text-pink-400 hover:text-pink-600 transition" title="Toggle Music">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
        </svg>
    </button>

    <!-- Popup Modal -->
    <div id="loveModal" class="modal fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full mx-4 text-center shadow-2xl transform scale-95 transition-transform duration-300 border-4 border-pink-100 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-pink-300 via-purple-300 to-pink-300"></div>
            <div class="text-6xl mb-4 animate-bounce">💖</div>
            <h2 class="text-3xl font-handwriting text-pink-600 mb-2">You are my everything!</h2>
            <p class="text-gray-600 mb-6">Every moment with you is a dream come true.</p>
            <button onclick="closeModal()" class="bg-pink-500 text-white px-6 py-2 rounded-full hover:bg-pink-600 transition w-full font-semibold">Close</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
